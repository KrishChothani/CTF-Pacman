name: Train and Deploy Model

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run Tests
        run: pytest tests/

      - name: Train Model
        run: |
          python -m scripts.train --config configs/default.yaml

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Resolve S3 Bucket Name
        id: bucket
        run: |
          BUCKET_NAME="${{ secrets.AWS_S3_BUCKET }}"

          if [ -z "$BUCKET_NAME" ]; then
            # Sanitize github.actor: lowercase, keep only a-z0-9 and hyphens
            ACTOR=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')
            # Strip leading/trailing hyphens (invalid in S3 bucket names)
            ACTOR=$(echo "$ACTOR" | sed 's/^-*//;s/-*$//')
            # Fallback if actor is empty after sanitization
            if [ -z "$ACTOR" ]; then
              ACTOR="default"
            fi
            BUCKET_NAME="ctf-pacman-logs-$ACTOR"
          fi

          # Final safety check
          if [ -z "$BUCKET_NAME" ]; then
            echo "ERROR: Could not determine a valid S3 bucket name."
            exit 1
          fi

          echo "Resolved bucket name: $BUCKET_NAME"
          # Export for subsequent steps
          echo "name=$BUCKET_NAME" >> $GITHUB_OUTPUT

      - name: Create S3 Bucket if Not Exists
        run: |
          BUCKET_NAME="${{ steps.bucket.outputs.name }}"
          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Bucket $BUCKET_NAME already exists."
          else
            echo "Creating bucket: $BUCKET_NAME"
            aws s3 mb "s3://$BUCKET_NAME"
          fi

      - name: Upload Model to S3
        run: |
          BUCKET_NAME="${{ steps.bucket.outputs.name }}"
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          S3_PATH="s3://$BUCKET_NAME/ctf_pacman_models/$TIMESTAMP/"

          echo "Uploading model to: $S3_PATH"
          aws s3 sync runs/ctf_default "$S3_PATH"
          echo "Model successfully uploaded to $S3_PATH"