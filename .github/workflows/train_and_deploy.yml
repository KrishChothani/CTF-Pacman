name: Train and Deploy Model

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run Tests
        run: pytest tests/

      - name: Train Model
        run: |
          # Use a smaller config for CI/CD or the default one.
          # To use a specific config, replace default.yaml with the target config file.
          python -m scripts.train --config configs/ci.yaml

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Change to your preferred region

      - name: Upload to S3
        run: |
          # Use secrets.AWS_S3_BUCKET if present, otherwise fallback to a generated unique name
          BUCKET_NAME="${{ secrets.AWS_S3_BUCKET }}"
          if [ -z "$BUCKET_NAME" ]; then
            ACTOR=$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')
            BUCKET_NAME="ctf-pacman-logs-$ACTOR"
          fi
          
          echo "Target bucket: $BUCKET_NAME"
          # Create the bucket if it doesn't exist. Ignore errors (e.g. if bucket already exists)
          aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null || aws s3 mb "s3://$BUCKET_NAME"
          
          # Using log_dir='runs/' and experiment_name='ci_test_run' from configs/ci.yaml
          aws s3 sync runs/ci_test_run "s3://$BUCKET_NAME/ctf_pacman_models/$(date +'%Y-%m-%d_%H-%M-%S')/"
