env:
  map_width: 32
  map_height: 16
  num_food_per_team: 20
  num_power_pellets: 2
  power_pellet_duration: 40
  max_steps: 300
  observation_radius: 5
  num_observation_channels: 10
  wall_density: 0.15
  food_respawn: false

agent:
  message_dim: 8
  use_communication: true
  role_switch_enabled: false

model:
  cnn_channels: [32, 64, 64]
  cnn_kernel_sizes: [3, 3, 3]
  cnn_strides: [1, 1, 1]
  flat_feature_dim: 16
  hidden_dim: 256
  actor_hidden_dim: 128
  critic_hidden_dim: 256
  message_hidden_dim: 64

training:
  total_timesteps: 100000
  num_envs: 16
  rollout_length: 128
  num_ppo_epochs: 4
  num_minibatches: 4
  learning_rate: 0.0003
  lr_schedule: "linear"
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_loss_coeff: 0.5
  entropy_coeff: 0.01
  entropy_coeff_schedule: "linear"
  max_grad_norm: 0.5
  checkpoint_interval: 50000
  selfplay_update_interval: 100000
  league_size: 10
  latest_opponent_fraction: 0.5
  historical_opponent_fraction: 0.3
  rule_based_opponent_fraction: 0.2

logging:
  log_dir: "runs/"
  experiment_name: "ctf_default"
  log_interval: 1000
  tensorboard: true
  print_interval: 5000

seed: 42
